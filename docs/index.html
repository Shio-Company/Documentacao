<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Documentação - Plataforma Shio</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Documentação técnica da Plataforma Shio: E-commerce + Comunidade">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
  <div id="app">Carregando documentação da Shio...</div>
  <script>
    window.$docsify = {
      // Nome que aparece na barra lateral 
      name: 'Plataforma Shio',
      repo: '', // Adicione o link do seu GitHub aqui
      
      // Configurações de Navegação
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,

      // Personalização de busca [cite: 81]
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Pesquisar requisitos...',
        noData: 'Nenhum resultado encontrado!',
        depth: 6
      },

      // Texto do rodapé ou nome do projeto
      nameLink: '/',
      formatUpdated: '{DD}/{MM} {HH}:{mm}',
    }
  </script>
  
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
</body>
</html>
